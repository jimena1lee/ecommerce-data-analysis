<style>
  :root { --gap: 10px; --radius: 14px; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 18px; background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
  }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 0 2px; }
  .header .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    display: flex; align-items: center; justify-content: center;
  }
  .header .logo svg { width: 16px; height: 16px; }
  .header h1 { font-size: 15px; font-weight: 700; color: #111; margin: 0; letter-spacing: -0.2px; }
  .header span { font-size: 12px; color: #9a9a9a; margin-left: auto; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); max-width: 640px; margin: 0 auto; }
  .card {
    position: relative; display: block; aspect-ratio: 4 / 5;
    border-radius: var(--radius); overflow: hidden; text-decoration: none;
    background: #eee; box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover { transform: translateY(-3px) scale(1.015); box-shadow: 0 10px 24px rgba(0,0,0,0.14); }
  .slides { position: absolute; inset: 0; }
  .slide { position: absolute; inset: 0; opacity: 0; transition: opacity .9s ease; }
  .slide.active { opacity: 1; }
  .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .badge {
    position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
    background: rgba(0,0,0,0.35); border-radius: 7px;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px);
  }
  .dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 4px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.55); transition: background .2s ease, transform .2s ease; }
  .dot.active { background: #fff; transform: scale(1.25); }
  .card::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0) 72%, rgba(0,0,0,0.22) 100%);
    pointer-events: none;
  }
</style>

<script>
  document.querySelectorAll('.card').forEach(function(card, ci) {
    var count = parseInt(card.dataset.count, 10);
    if (count <= 1) return;
    var slides = card.querySelectorAll('.slide');
    var dots = card.querySelectorAll('.dot');
    var cur = 0;
    function showSlide(next) {
      if (next === cur) return;
      slides[cur].classList.remove('active');
      dots[cur].classList.remove('active');
      cur = next;
      slides[cur].classList.add('active');
      dots[cur].classList.add('active');
    }
    setInterval(function() {
      showSlide((cur + 1) % count);
    }, 4200 + ci * 450);
    card.addEventListener('mouseenter', function() {
      showSlide(0);
    });
  });
</script>
