<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>컬리 패션 리뷰 인사이트 — MD 소싱 도우미</title>
<style>
/* ── 디자인 토큰 ─────────────────────────────────────────────── */
:root{
  --brand:#5f0080; --brand-deep:#43005b; --brand-mid:#8a4ea8;
  --brand-wash:#f5ecf9; --brand-line:#e3cdef;
  --page:#f7f5f3; --surface:#fcfcfb;
  --ink:#1a141b; --ink-2:#565059; --muted:#8b8590;
  --line:#e6e2e7; --baseline:#c9c4cd;
  --pos:#6da7ec; --neu:#dedbd3; --neg:#e34948;      /* 사이즈 스택: 크게/정/작게 */
  --good:#0ca30c; --warn:#b97f00; --crit:#d03b3b;   /* 상태 (아이콘+라벨 동반) */
  --bar:#6d2a8f;                                     /* 단일 계열 막대 */
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  background:var(--page); color:var(--ink); line-height:1.55;
  font-size:15px; letter-spacing:-0.01em;
}
button{font:inherit; letter-spacing:inherit; cursor:pointer; background:none; border:none; color:inherit}
.num{font-variant-numeric:tabular-nums}

/* ── 헤더 ────────────────────────────────────────────────────── */
.hdr{background:linear-gradient(160deg,var(--brand-deep),var(--brand) 62%,#7c1ea3); color:#fff; padding:34px 20px 58px}
.hdr-inner{max-width:1060px; margin:0 auto}
.hdr-eyebrow{display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:600;
  background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.25);
  padding:4px 12px; border-radius:99px; margin-bottom:14px}
.hdr h1{font-size:clamp(24px,4.2vw,34px); font-weight:800; letter-spacing:-0.03em; line-height:1.25}
.hdr h1 em{font-style:normal; color:#ecc7ff}
.hdr-sub{margin-top:10px; font-size:14px; color:rgba(255,255,255,.82); max-width:640px}
.hdr-scale{margin-top:16px; display:flex; flex-wrap:wrap; gap:8px; font-size:12.5px}
.hdr-scale span{background:rgba(255,255,255,.12); border-radius:6px; padding:3px 10px}
.hdr-scale b{font-weight:700}

/* ── 탭 ─────────────────────────────────────────────────────── */
.tabs{max-width:1060px; margin:-26px auto 0; padding:0 20px; display:flex; gap:8px; position:relative; z-index:2}
.tab{flex:0 0 auto; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:12px 18px; font-weight:600; font-size:14px; color:var(--ink-2);
  box-shadow:0 2px 6px rgba(26,20,27,.05); transition:border-color .15s,color .15s}
.tab .tab-no{display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:1px}
.tab.active{border-color:var(--brand); color:var(--brand); box-shadow:0 3px 10px rgba(95,0,128,.12)}
.tab.active .tab-no{color:var(--brand-mid)}
.tab:focus-visible{outline:2px solid var(--brand); outline-offset:2px}

/* ── 패널 공통 ───────────────────────────────────────────────── */
main{max-width:1060px; margin:0 auto; padding:26px 20px 40px}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px}
.card+.card{margin-top:14px}
.card h3{font-size:15px; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px}
.card .card-cap{font-size:12.5px; color:var(--muted); margin-bottom:14px}
.placeholder{color:var(--muted); font-size:14px; padding:30px 0; text-align:center}

/* Semantic ID 칩 — 시그니처 요소 */
.sid{display:inline-flex; gap:3px; vertical-align:middle}
.sid span{font-size:11px; font-weight:700; padding:1px 7px; border-radius:5px;
  background:var(--brand-wash); color:var(--brand); border:1px solid var(--brand-line)}

/* ── 탭1: 리뷰 미리보기 ──────────────────────────────────────── */
.predict-grid{display:grid; grid-template-columns:320px minmax(0,1fr); gap:14px; align-items:start}
.predict-grid>div{min-width:0}
.card{min-width:0}
.inp-group{margin-bottom:15px}
.inp-group:last-child{margin-bottom:0}
.inp-label{font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:7px;
  display:flex; justify-content:space-between; align-items:baseline}
.inp-label small{font-weight:500; color:var(--muted); font-size:11px}
.chips{display:flex; flex-wrap:wrap; gap:6px}
.chip{border:1px solid var(--line); background:var(--surface); border-radius:99px;
  padding:5px 12px; font-size:13px; color:var(--ink-2); transition:border-color .12s}
.chip:hover{border-color:var(--brand-mid)}
.chip.on{background:var(--brand); border-color:var(--brand); color:#fff; font-weight:600}
.chip:focus-visible{outline:2px solid var(--brand); outline-offset:1px}
.reset-btn{margin-top:16px; width:100%; border:1px dashed var(--baseline); border-radius:8px;
  padding:8px; font-size:13px; color:var(--muted)}
.reset-btn:hover{color:var(--brand); border-color:var(--brand-mid)}
.basis{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--brand-deep);
  background:var(--brand-wash); border:1px solid var(--brand-line); border-radius:7px;
  padding:5px 12px; margin-bottom:12px}
.notice{border:1px solid var(--line); border-left:4px solid var(--warn); border-radius:8px;
  background:var(--surface); padding:14px 16px; font-size:13.5px; color:var(--ink-2)}
/* 리스크 게이지 */
.risk-line{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap}
.risk-chip{display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:700;
  border-radius:99px; padding:3px 12px; border:1px solid}
.risk-low{color:var(--good); border-color:var(--good)}
.risk-mid{color:var(--ink-2); border-color:var(--baseline)}
.risk-high{color:var(--crit); border-color:var(--crit)}
.gauge{position:relative; height:12px; border-radius:6px; background:var(--brand-wash);
  border:1px solid var(--line); margin:16px 0 4px}
.gauge-fill{position:absolute; left:0; top:0; bottom:0; border-radius:6px 4px 4px 6px; background:var(--bar)}
.gauge-tick{position:absolute; top:-5px; bottom:-5px; width:2px; background:var(--ink-2)}
.gauge-tick i{position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-style:normal;
  font-size:11px; color:var(--muted); white-space:nowrap}
.gauge-cap{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted)}
/* 액션 제안 */
.action-list{list-style:none; display:flex; flex-direction:column; gap:8px}
.action-list li{display:flex; gap:9px; font-size:13.5px; padding:10px 13px;
  border:1px solid var(--line); border-radius:8px; background:var(--surface)}
.action-list li b{flex:0 0 auto}
/* 막대 (예상 리뷰 프로필) */
.bar-row{display:grid; grid-template-columns:minmax(110px,150px) 1fr 46px; gap:10px;
  align-items:center; padding:4px 0; font-size:13px}
.bar-row .bl{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.bar-row .bl small{color:var(--muted); font-size:11.5px}
.bar-track{height:10px}
.bar-fill{height:10px; background:var(--bar); border-radius:2px 4px 4px 2px; min-width:2px}
.bar-val{color:var(--ink-2); font-size:12.5px; text-align:right}
/* 유사 상품 목록 */
.simlist{display:flex; flex-direction:column; gap:7px; max-height:320px; overflow-y:auto}
.simrow{display:flex; align-items:center; gap:10px; padding:8px 12px;
  border:1px solid var(--line); border-radius:8px; font-size:13px}
.simrow .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.simrow .nm small{display:block; color:var(--muted); font-size:11.5px}
.simrow .meta{color:var(--ink-2); font-size:12px; white-space:nowrap; text-align:right}
.simrow .meta small{display:block; color:var(--muted); font-size:11px}
/* 리뷰 발췌 */
.rev-quote{border-left:3px solid var(--brand-line); padding:2px 0 2px 13px; margin-bottom:12px}
.rev-quote:last-child{margin-bottom:0}
.rev-quote p{font-size:13.5px; color:var(--ink)}
.rev-quote .rq-meta{font-size:11.5px; color:var(--muted); margin-top:3px}
.tag{display:inline-block; font-size:11px; font-weight:600; border-radius:5px; padding:1px 7px; margin-left:5px}
.tag-neg{background:#fdeaea; color:var(--crit)}
.tag-pos{background:#e9f5e9; color:#0a6b0a}

/* ── 탭2: 브랜드 프로필 ──────────────────────────────────────── */
.brand-sel{width:100%; max-width:420px; font:inherit; padding:9px 12px; border:1px solid var(--line);
  border-radius:8px; background:var(--surface); color:var(--ink)}
.brand-sel:focus-visible{outline:2px solid var(--brand); outline-offset:1px}
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:4px}
.stat{border:1px solid var(--line); border-radius:8px; padding:12px 14px}
.stat .st-label{font-size:11.5px; color:var(--muted); margin-bottom:2px}
.stat .st-val{font-size:20px; font-weight:800; letter-spacing:-0.02em}
.stat .st-val small{font-size:12px; font-weight:600; margin-left:4px; white-space:nowrap}
.delta-up{color:var(--crit)} .delta-down{color:var(--good)}
.badge-thin{display:inline-block; font-size:11px; font-weight:600; color:var(--warn);
  border:1px solid var(--warn); border-radius:99px; padding:1px 9px; margin-left:8px; vertical-align:middle}
/* 사이즈 스택 */
.stack{display:flex; gap:2px; height:26px; border-radius:6px; overflow:hidden; margin:10px 0 8px}
.stack div{display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; color:#fff; min-width:0}
.stack .sg-big{background:var(--pos)} .stack .sg-fit{background:var(--neu); color:var(--ink-2)} .stack .sg-small{background:var(--neg)}
.legend{display:flex; flex-wrap:wrap; gap:14px; font-size:12.5px; color:var(--ink-2)}
.legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px}
.mini-table{width:100%; border-collapse:collapse; font-size:13px}
.mini-table th{font-size:11.5px; color:var(--muted); font-weight:600; text-align:left; padding:6px 8px; border-bottom:1px solid var(--line)}
.mini-table td{padding:7px 8px; border-bottom:1px solid var(--line)}
.mini-table td.num,.mini-table th.num{text-align:right}
.mini-table tr:last-child td{border-bottom:none}

/* ── 푸터 ────────────────────────────────────────────────────── */
footer{border-top:1px solid var(--line); background:var(--surface); margin-top:30px}
.ftr-inner{max-width:1060px; margin:0 auto; padding:20px; font-size:12.5px; color:var(--muted)}
.ftr-inner b{color:var(--ink-2)}

/* ── 모바일 ──────────────────────────────────────────────────── */
@media (max-width:640px){
  .tabs{overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap; padding:10px 14px}
  .hdr{padding:26px 16px 50px}
  main{padding:20px 14px 30px}
  .predict-grid{grid-template-columns:1fr}
  .bar-row{grid-template-columns:minmax(90px,110px) 1fr 42px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important; animation:none!important}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-eyebrow">컬리 패션 · 리뷰 마이닝 대시보드</div>
    <h1>리뷰가 먼저 알려주는 것 —<br><em>신상품의 미래를 기존 리뷰에서 읽는다</em></h1>
    <p class="hdr-sub">고객 리뷰를 AI로 태깅해 만든 실착 데이터베이스로, 아직 리뷰가 없는
    신상품에 어떤 반응이 달릴지 미리 가늠하는 MD 보조 도구입니다.</p>
    <div class="hdr-scale" id="hdr-scale"></div>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="대시보드 탭">
  <button class="tab active" role="tab" aria-selected="true" data-tab="predict">
    <span class="tab-no">신상품 검토</span>리뷰 미리보기</button>
  <button class="tab" role="tab" aria-selected="false" data-tab="brand">
    <span class="tab-no">입점·리오더</span>브랜드 프로필</button>
  <button class="tab" role="tab" aria-selected="false" data-tab="explore">
    <span class="tab-no">데이터 근거</span>연구 탐색</button>
</nav>

<main>
  <section id="tab-predict" class="panel active" role="tabpanel">
    <div class="predict-grid">
      <div class="card">
        <h3>검토할 신상품 조건</h3>
        <p class="card-cap">아는 정보만 선택하세요 — 고를수록 예측이 좁혀집니다.</p>
        <div id="inp-cat" class="inp-group"></div>
        <div id="inp-axes"></div>
        <div id="inp-band" class="inp-group"></div>
        <button id="inp-reset" class="reset-btn">조건 초기화</button>
      </div>
      <div>
        <div id="pr-basis"></div>
        <div id="pr-out"></div>
      </div>
    </div>
  </section>
  <section id="tab-brand" class="panel" role="tabpanel">
    <div class="card">
      <h3>브랜드 프로필</h3>
      <p class="card-cap" id="brand-cap"></p>
      <select id="brand-sel" class="brand-sel" aria-label="브랜드 선택"></select>
    </div>
    <div id="brand-out"></div>
  </section>
  <section id="tab-explore" class="panel" role="tabpanel">
    <div class="card"><div class="placeholder">연구 탐색 — 구현 예정</div></div>
  </section>
</main>

<footer>
  <div class="ftr-inner" id="ftr"></div>
</footer>

<script>
/*__PAYLOAD__*/

/* ── 공통 유틸 ───────────────────────────────────────────────── */
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => [...el.querySelectorAll(sel)];
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const pct = x => Math.round(x * 100) + "%";
const won = n => n == null ? "–" : n.toLocaleString("ko-KR") + "원";

/* Semantic ID → 칩 마크업 */
function sidChips(sid){
  if(!sid) return '<span style="color:var(--muted)">–</span>';
  return '<span class="sid">' + sid.split("-").map(s => "<span>" + esc(s) + "</span>").join("") + "</span>";
}

/* ── 탭 전환 ─────────────────────────────────────────────────── */
$$(".tab").forEach(btn => btn.addEventListener("click", () => {
  $$(".tab").forEach(b => { b.classList.toggle("active", b === btn); b.setAttribute("aria-selected", b === btn); });
  $$(".panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + btn.dataset.tab));
}));

/* ── 헤더·푸터 데이터 표기 ───────────────────────────────────── */
$("#hdr-scale").innerHTML =
  `<span>카테고리 <b>${Object.values(DATA.meta.cats).join(" · ")}</b></span>` +
  `<span>상품 <b class="num">${DATA.meta.n_products}개</b></span>` +
  `<span>실착 태깅 리뷰 <b class="num">${DATA.meta.n_reviews.toLocaleString()}건</b></span>`;

/* ══ 탭1: 신상품 리뷰 미리보기 ══════════════════════════════════ */
const PRED_AXES = ["계절감", "두께", "핏", "신축성", "착용상황"];
const PRICE_BANDS = [
  ["a", 0, 20000, "~2만원"], ["b", 20000, 40000, "2~4만원"],
  ["c", 40000, 70000, "4~7만원"], ["d", 70000, Infinity, "7만원~"],
];
const P = { cat: "165", sel: {}, band: null };

function findSimilar() {
  const nSel = Object.keys(P.sel).length;
  const bandDef = PRICE_BANDS.find(b => b[0] === P.band);
  return DATA.products
    .filter(p => p.cat === P.cat)
    .map(p => {
      let score = 0; const matched = [];
      for (const [axis, label] of Object.entries(P.sel)) {
        const m = p.mentions[axis] || {};
        if (m[label]) { score += 2; matched.push(axis); }
      }
      if (bandDef && p.price != null && p.price >= bandDef[1] && p.price < bandDef[2]) score += 1;
      return { p, score, matched };
    })
    .filter(x => nSel === 0 ? true : x.score > 0)
    .sort((a, b) => b.score - a.score || b.p.review_n - a.p.review_n)
    .slice(0, 12);
}

function chipHTML(group, val, label, on) {
  return `<button class="chip${on ? " on" : ""}" data-g="${group}" data-v="${esc(val)}">${esc(label)}</button>`;
}

function renderPredictInputs() {
  $("#inp-cat").innerHTML =
    `<div class="inp-label">카테고리 <small>필수</small></div><div class="chips">` +
    Object.entries(DATA.meta.cats).map(([c, nm]) => chipHTML("cat", c, nm, P.cat === c)).join("") + "</div>";
  $("#inp-axes").innerHTML = PRED_AXES.map(axis =>
    `<div class="inp-group"><div class="inp-label">${axis} <small>선택</small></div><div class="chips">` +
    DATA.codebook[axis].map(label => chipHTML("ax:" + axis, label, label, P.sel[axis] === label)).join("") +
    "</div></div>").join("");
  $("#inp-band").innerHTML =
    `<div class="inp-label">판매가 <small>선택</small></div><div class="chips">` +
    PRICE_BANDS.map(([k, , , nm]) => chipHTML("band", k, nm, P.band === k)).join("") + "</div>";
}

function aggMentions(sims) {
  const agg = {};
  for (const { p } of sims)
    for (const [axis, labels] of Object.entries(p.mentions))
      for (const [label, n] of Object.entries(labels)) {
        (agg[axis] = agg[axis] || {})[label] = (agg[axis][label] || 0) + n;
      }
  return agg;
}

function mdActions(agg, rate, catAvg) {
  const out = [];
  const share = (axis, label) => {
    const m = agg[axis] || {}; const tot = Object.values(m).reduce((a, b) => a + b, 0);
    return tot ? (m[label] || 0) / tot : 0;
  };
  if (share("사이즈감", "작게 나옴") >= 0.25)
    out.push(["⚠️", `이 조합은 <b>'작게 나옴'</b> 언급이 잦습니다(사이즈 언급 중 ${pct(share("사이즈감", "작게 나옴"))}). 상세페이지에 "실측보다 타이트한 편" 안내를 권장합니다.`]);
  if (share("사이즈감", "크게 나옴") >= 0.35)
    out.push(["⚠️", `<b>'크게 나옴'</b> 언급이 많습니다(${pct(share("사이즈감", "크게 나옴"))}). "여유 있는 핏" 안내 또는 사이즈 다운 추천 문구를 검토하세요.`]);
  if (share("비침", "있음") >= 0.30)
    out.push(["👁️", `<b>비침</b> 언급 비율이 높습니다(비침 언급 중 ${pct(share("비침", "있음"))}). 이너 착용 안내·실측 촬영컷 보강을 권장합니다.`]);
  if (catAvg > 0 && rate >= catAvg * 1.5)
    out.push(["🚨", `유사 상품군 불만율(${pct(rate)})이 카테고리 평균(${pct(catAvg)})을 크게 웃돕니다. 입고 전 검수·QC 강화를 검토하세요.`]);
  else if (catAvg > 0 && rate <= catAvg * 0.6)
    out.push(["✅", `불만 신호가 적은 안정적인 조합입니다(유사 상품군 불만율 ${pct(rate)} vs 평균 ${pct(catAvg)}).`]);
  if (!out.length)
    out.push(["ℹ️", "뚜렷한 리스크 신호는 없습니다 — 아래 실제 리뷰 발췌를 직접 확인해 보세요."]);
  return out;
}

function renderPredict() {
  const sims = findSimilar();
  const revs = sims.reduce((a, x) => a + x.p.review_n, 0);
  const comps = sims.reduce((a, x) => a + x.p.complaint_n, 0);
  const catStat = DATA.cat_stats[P.cat];
  $("#pr-basis").innerHTML =
    `<div class="basis">📎 유사 상품 <b class="num">&nbsp;${sims.length}개</b> · 리뷰 <b class="num">&nbsp;${revs}건</b> 기반 예측</div>`;

  /* 정직성 게이트 */
  if (sims.length < 3 || revs < 15) {
    $("#pr-out").innerHTML =
      `<div class="notice"><b>조건에 맞는 데이터가 부족합니다</b> (유사 상품 ${sims.length}개 · 리뷰 ${revs}건).<br>
      속성을 줄여 범위를 넓히거나, 아래 카테고리 평균을 참고하세요.<br><br>
      <b>${esc(DATA.meta.cats[P.cat])} 평균</b> — 상품 ${catStat.n_products}개 · 리뷰 ${catStat.n_reviews}건 ·
      불만율 ${pct(catStat.complaint_rate)} · 평균가 ${won(catStat.avg_price)}</div>`;
    return;
  }

  const agg = aggMentions(sims);
  const rate = revs ? comps / revs : 0;
  const catAvg = catStat.complaint_rate;

  /* 리스크 게이지 */
  const level = rate >= catAvg * 1.5 ? ["risk-high", "▲ 불만 리스크 높음"]
              : rate <= catAvg * 0.6 ? ["risk-low", "✓ 불만 리스크 낮음"]
              : ["risk-mid", "– 불만 리스크 보통"];
  const gMax = Math.max(rate, catAvg) * 1.6 || 0.1;
  const gauge =
    `<div class="risk-line"><span class="risk-chip ${level[0]}">${level[1]}</span>
     <span style="font-size:13px;color:var(--ink-2)">예상 불만율 <b class="num">${pct(rate)}</b>
     <small style="color:var(--muted)">(카테고리 평균 ${pct(catAvg)})</small></span></div>
     <div class="gauge"><div class="gauge-fill" style="width:${Math.min(rate / gMax * 100, 100)}%"></div>
     <div class="gauge-tick" style="left:${Math.min(catAvg / gMax * 100, 100)}%"><i>평균 ${pct(catAvg)}</i></div></div>
     <div class="gauge-cap"><span>0%</span><span>${pct(gMax)}</span></div>`;

  /* MD 액션 */
  const actions = mdActions(agg, rate, catAvg).map(([ic, t]) => `<li><b>${ic}</b><span>${t}</span></li>`).join("");

  /* 예상 리뷰 프로필: 축:라벨 상위 8개 */
  const pairs = [];
  for (const [axis, labels] of Object.entries(agg))
    for (const [label, n] of Object.entries(labels)) pairs.push([axis, label, n]);
  pairs.sort((a, b) => b[2] - a[2]);
  const profile = pairs.slice(0, 8).map(([axis, label, n]) =>
    `<div class="bar-row"><span class="bl">${esc(label)} <small>${axis}</small></span>
     <div class="bar-track"><div class="bar-fill" style="width:${Math.max(n / pairs[0][2] * 100, 2)}%"></div></div>
     <span class="bar-val num">${Math.round(n / revs * 100)}%</span></div>`).join("");

  /* 실제 리뷰 발췌: 불만사유 있는 것 우선 3건 */
  const quotes = [];
  const seen = new Set();
  for (const pass of [true, false])
    for (const { p } of sims)
      for (const s of p.samples) {
        if (quotes.length >= 3 || seen.has(s.t) || (pass ? !s.reason : !!s.reason)) continue;
        seen.add(s.t);
        quotes.push(
          `<div class="rev-quote"><p>"${esc(s.t)}"</p><div class="rq-meta">${esc(p.name.slice(0, 30))}
           ${s.reason ? `<span class="tag tag-neg">${esc(s.reason)}</span>` : `<span class="tag tag-pos">${esc(s.sent)}</span>`}</div></div>`);
      }

  /* 유사 상품 목록 */
  const simrows = sims.map(({ p, matched }) =>
    `<div class="simrow"><div class="nm">${esc(p.name)}<small>${esc(p.brand)} · ${sidChips(p.sid)}
     ${matched.length ? ` · 일치 ${matched.join(", ")}` : ""}</small></div>
     <div class="meta num">리뷰 ${p.review_n} · 불만 ${p.complaint_n}<small>불만율 ${pct(p.review_n ? p.complaint_n / p.review_n : 0)}</small></div></div>`).join("");

  $("#pr-out").innerHTML =
    `<div class="card"><h3>리스크 진단</h3><p class="card-cap">유사 상품군의 불만율을 카테고리 평균과 비교합니다.</p>${gauge}
     <ul class="action-list" style="margin-top:16px">${actions}</ul></div>
     <div class="card"><h3>예상 리뷰 프로필</h3><p class="card-cap">유사 상품 리뷰에서 실제로 언급된 실착 속성 상위 8개 — 이 상품에도 비슷한 이야기가 달릴 확률이 높습니다. (%: 리뷰 ${revs}건 중 언급 비율)</p>${profile}</div>
     <div class="card"><h3>이런 리뷰가 달릴 수 있어요</h3><p class="card-cap">유사 상품에 실제로 달린 리뷰 발췌</p>${quotes.join("")}</div>
     <div class="card"><h3>근거가 된 유사 상품 ${sims.length}개</h3><p class="card-cap">선택 조건과 리뷰 언급이 겹치는 기존 판매 상품</p><div class="simlist">${simrows}</div></div>`;
}

document.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  const g = chip.dataset.g, v = chip.dataset.v;
  if (g === "cat") P.cat = v;
  else if (g === "band") P.band = P.band === v ? null : v;
  else if (g && g.startsWith("ax:")) {
    const axis = g.slice(3);
    if (P.sel[axis] === v) delete P.sel[axis]; else P.sel[axis] = v;
  } else return;
  renderPredictInputs(); renderPredict();
});
$("#inp-reset").addEventListener("click", () => {
  P.cat = "165"; P.sel = {}; P.band = null;
  renderPredictInputs(); renderPredict();
});
renderPredictInputs();
renderPredict();

/* ══ 탭2: 브랜드 프로필 ═════════════════════════════════════════ */
const ALL_REVS = DATA.products.reduce((a, p) => a + p.review_n, 0);
const ALL_COMPS = DATA.products.reduce((a, p) => a + p.complaint_n, 0);
const ALL_RATE = ALL_COMPS / ALL_REVS;

function topLabels(mentions, axis, k) {
  const m = mentions[axis] || {};
  return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, k);
}

function renderBrand(name) {
  const b = DATA.brands.find(x => x.name === name);
  if (!b) { $("#brand-out").innerHTML = ""; return; }

  const thin = b.n_reviews < 15;
  const rate = b.complaint_rate;
  const diff = rate == null ? null : Math.round((rate - ALL_RATE) * 100);
  const deltaHTML = rate == null ? "" :
    diff > 0 ? `<small class="delta-up">▲ 평균+${diff}%p</small>` :
    diff < 0 ? `<small class="delta-down">▼ 평균${diff}%p</small>` :
    `<small style="color:var(--muted)">평균 수준</small>`;

  /* 사이즈 스택 */
  const sTot = Object.values(b.size).reduce((a, x) => a + x, 0);
  const seg = (key, cls, label) => {
    const n = b.size[key] || 0; if (!sTot || !n) return "";
    const w = n / sTot * 100;
    return `<div class="${cls}" style="flex:${w}">${w >= 14 ? Math.round(w) + "%" : ""}</div>`;
  };
  const allSmallShare = (() => {
    let s = 0, t = 0;
    for (const p of DATA.products) { const m = p.mentions["사이즈감"] || {};
      for (const [k, n] of Object.entries(m)) { t += n; if (k === "작게 나옴") s += n; } }
    return t ? s / t : 0;
  })();
  const brandSmall = sTot ? (b.size["작게 나옴"] || 0) / sTot : 0;
  const sizeComment = !sTot ? "사이즈 언급 데이터가 없습니다." :
    brandSmall >= allSmallShare * 1.5 && brandSmall >= 0.2 ?
      `'작게 나옴' 언급 비율(${pct(brandSmall)})이 전체 평균(${pct(allSmallShare)})보다 뚜렷하게 높습니다 — 사이즈 안내 문구를 권장합니다.` :
    (b.size["크게 나옴"] || 0) / sTot >= 0.4 ?
      `'크게 나옴' 언급이 많은 브랜드입니다 — 여유 핏 기조로 보입니다.` :
      `사이즈 언급 분포가 전체 평균과 비슷한 수준입니다.`;

  const situ = topLabels(b.mentions, "착용상황", 2).map(([l]) => l);
  const season = topLabels(b.mentions, "계절감", 2).map(([l]) => l);
  const chips = arr => arr.length ? arr.map(l => `<span class="sid"><span>${esc(l)}</span></span>`).join(" ") : '<span style="color:var(--muted)">–</span>';

  const reasons = b.reasons.length
    ? b.reasons.map(([r, n]) => `<li><b>•</b><span>${esc(r)} <small style="color:var(--muted)">(${n}건)</small></span></li>`).join("")
    : `<li><b>✓</b><span>기록된 불만사유가 없습니다.</span></li>`;

  const prodRows = b.products.map(p =>
    `<tr><td>${esc(p.name.length > 38 ? p.name.slice(0, 38) + "…" : p.name)}</td>
     <td class="num">${p.review_n}</td><td class="num">${p.complaint_n}</td>
     <td class="num">${pct(p.review_n ? p.complaint_n / p.review_n : 0)}</td></tr>`).join("");

  $("#brand-out").innerHTML =
    `<div class="card"><h3>${esc(b.name)}${thin ? '<span class="badge-thin">표본 작음 — 참고용</span>' : ""}</h3>
     <p class="card-cap">${b.cats.map(c => DATA.meta.cats[c] || c).join(" · ")}</p>
     <div class="stat-grid">
       <div class="stat"><div class="st-label">입점 상품</div><div class="st-val num">${b.n_products}개</div></div>
       <div class="stat"><div class="st-label">태깅 리뷰</div><div class="st-val num">${b.n_reviews}건</div></div>
       <div class="stat"><div class="st-label">평균 판매가</div><div class="st-val num" style="font-size:17px">${won(b.avg_price)}</div></div>
       <div class="stat"><div class="st-label">평균 할인율</div><div class="st-val num">${b.avg_discount != null ? b.avg_discount + "%" : "–"}</div></div>
       <div class="stat"><div class="st-label">불만율</div><div class="st-val num">${rate != null ? pct(rate) : "–"} ${deltaHTML}</div></div>
     </div></div>
     <div class="card"><h3>사이즈 경향</h3><p class="card-cap">리뷰의 사이즈감 언급 ${sTot}건 분포</p>
     <div class="stack">${seg("크게 나옴", "sg-big")}${seg("정사이즈", "sg-fit")}${seg("작게 나옴", "sg-small")}</div>
     <div class="legend"><span><i style="background:var(--pos)"></i>크게 나옴 ${b.size["크게 나옴"] || 0}</span>
       <span><i style="background:var(--neu)"></i>정사이즈 ${b.size["정사이즈"] || 0}</span>
       <span><i style="background:var(--neg)"></i>작게 나옴 ${b.size["작게 나옴"] || 0}</span></div>
     <p style="font-size:13.5px; margin-top:10px">${sizeComment}</p></div>
     <div class="card"><h3>주력 착용상황 · 계절감</h3><p class="card-cap">리뷰에서 가장 자주 언급된 값</p>
     <p style="font-size:14px">착용상황 ${chips(situ)} &nbsp; 계절감 ${chips(season)}</p></div>
     <div class="card"><h3>자주 나오는 불만</h3><ul class="action-list">${reasons}</ul></div>
     <div class="card"><h3>리뷰 데이터가 있는 상품 ${b.products.length}개</h3>
     <div style="overflow:auto; max-height:340px"><table class="mini-table"><thead><tr><th>상품명</th><th class="num">리뷰</th><th class="num">불만</th><th class="num">불만율</th></tr></thead>
     <tbody>${prodRows}</tbody></table></div></div>`;
}

$("#brand-cap").textContent =
  `상품 3개 이상 입점 브랜드 ${DATA.brands.length}개 — 신규 입점 검토나 리오더 판단 시 참고하세요.`;
$("#brand-sel").innerHTML = DATA.brands.map(b =>
  `<option value="${esc(b.name)}">${esc(b.name)} (상품 ${b.n_products} · 리뷰 ${b.n_reviews})</option>`).join("");
$("#brand-sel").addEventListener("change", e => renderBrand(e.target.value));
renderBrand(DATA.brands[0].name);

$("#ftr").innerHTML =
  `<b>만든 방법</b> — 컬리 리뷰 수집(크롤러) → Gemini로 8개 실착 속성 태깅 → 코드북 정규화 → ` +
  `상품별 Semantic ID 부여 → 이 대시보드(정적 HTML, 실시간 AI 호출 없음) · 데이터 기준일 ${DATA.meta.built}`;
</script>
</body>
